<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iMaliPay — API Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <a href="#" class="topbar-logo" aria-label="iMaliPay Home">
    <div class="logo-mark" aria-hidden="true">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4h6a8 8 0 0 1 0 16H6z"/>
      </svg>
    </div>
    <span class="logo-text">iMali<em>Pay</em></span>
  </a>

  <div class="topbar-divider"></div>
  <span class="topbar-title">API Reference</span>
  <div class="topbar-spacer"></div>

  <div class="topbar-search" role="search">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Pesquisar…" aria-label="Pesquisar endpoints">
    <kbd>⌘K</kbd>
  </div>

  <div class="topbar-actions">
    <div class="lang-toggle" role="group" aria-label="Idioma">
      <button class="lang-btn active" data-lang="pt" aria-pressed="true">PT</button>
      <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
    </div>
    <div class="env-toggle" role="group" aria-label="Ambiente">
      <button class="env-btn active" data-env="sandbox">Sandbox</button>
      <button class="env-btn" data-env="live">Live</button>
    </div>
    <button class="icon-btn" id="themeToggle" aria-label="Mudar para modo claro">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="icon-btn" id="themeToggleLight" aria-label="Mudar para modo escuro" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
    </button>
    <button class="topbar-cta">Obter Chaves API</button>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Navegação da API">
    <!-- Preenchido dinamicamente pelo JS -->
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent" role="main">
    <!-- Preenchido dinamicamente pelo JS -->
    <div class="section-content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </main>

  <!-- CODE PANEL -->
  <aside class="code-panel" id="codePanel" aria-label="Exemplos de código">
    <!-- Preenchido dinamicamente pelo JS -->
  </aside>

</div>

<script src="js/script.js"></script>
</body>
</html>
