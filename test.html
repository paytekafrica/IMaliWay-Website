<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iMaliway - Modernize seus pagamentos</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════
       IMALIWAY v3 — main.css
       Tema: Dark (Visily) com toggle claro/escuro
       Brand: iMali / Paytek · Maputo, Moçambique
    ═══════════════════════════════════════════════════════ */

    /* ─── RESET ─── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
    img,svg{display:block;max-width:100%;}
    a{text-decoration:none;color:inherit;}
    button{cursor:pointer;font-family:inherit;border:none;background:none;}
    ul{list-style:none;}
    input{font-family:inherit;}

    /* ─── BRAND TOKENS (fixos) ─── */
    :root{
      --green:        #52A828;
      --green-dark:   #2E7D1E;
      --green-light:  #6DC135;
      --green-tint:   rgba(82,168,40,.12);
      --green-tint2:  rgba(82,168,40,.22);
      --green-glow:   rgba(82,168,40,.15);

      --font-head:'Montserrat',sans-serif;
      --font-body:'DM Sans',sans-serif;
      --font-mono:'JetBrains Mono',monospace;

      --r-sm:4px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-2xl:20px; --r-full:9999px;
      --t-fast:150ms ease; --t-norm:250ms ease; --t-slow:400ms ease;
    }

    /* ═══════════════════════════════════════════════════════
       TEMA ESCURO (default)
    ═══════════════════════════════════════════════════════ */
    [data-theme="dark"]{
      --bg-page:      #0C0C0C;
      --bg-section:   #111111;
      --bg-alt:       #0C0C0C;
      --bg-card:      #181818;
      --bg-card-hover:#1F1F1F;
      --bg-input:     #1A1A1A;
      --bg-code:      #0D1117;
      --bg-terminal:  #0D1117;

      --border:       rgba(255,255,255,.09);
      --border-hover: rgba(255,255,255,.18);
      --border-strong:rgba(255,255,255,.25);

      --text-primary:   #FFFFFF;
      --text-secondary: rgba(255,255,255,.6);
      --text-muted:     rgba(255,255,255,.35);
      --text-placeholder:rgba(255,255,255,.25);

      --nav-bg:       rgba(12,12,12,.88);
      --nav-border:   rgba(255,255,255,.07);
      --nav-link:     rgba(255,255,255,.55);
      --nav-link-hover:#FFFFFF;

      --hero-headline:#FFFFFF;
      --hero-bg:      #0C0C0C;

      --method-card:  #181818;
      --method-border:rgba(255,255,255,.09);
      --method-hover: #222222;

      --stepper-bg:   #111111;
      --screen-bg:    #1A1A1A;
      --screen-bar:   #252525;
      --screen-border:rgba(255,255,255,.1);
      --screen-input: #242424;
      --screen-text:  rgba(255,255,255,.75);

      --dev-bg:       #0C0C0C;
      --pillar-bg:    #181818;
      --pillar-border:rgba(255,255,255,.09);

      --faq-bg:       #111111;
      --faq-card:     #181818;
      --faq-border:   rgba(255,255,255,.09);
      --faq-hover:    rgba(82,168,40,.15);
      --faq-text:     rgba(255,255,255,.65);

      --cta-bg:       #111111;
      --cta-card:     #181818;
      --cta-border:   rgba(82,168,40,.3);

      --cert-bg:      #111111;
      --cert-card:    #181818;
      --cert-border:  rgba(255,255,255,.09);
      --cert-bdm:     #333333;
      --cert-simo-bg: #1a2535;
      --cert-mpesa-bg:#1a2b1e;
      --cert-emola-bg:#2b1a12;
      --cert-mkesh-bg:#1e1a2b;

      --footer-bg:    #080808;
      --footer-border:rgba(255,255,255,.06);
      --footer-text:  rgba(255,255,255,.38);
      --footer-link:  rgba(255,255,255,.45);
      --footer-link-h:#6DC135;

      --sh-card: 0 4px 24px rgba(0,0,0,.4);
      --sh-green: 0 0 32px rgba(82,168,40,.2);
    }

    /* ═══════════════════════════════════════════════════════
       TEMA CLARO
    ═══════════════════════════════════════════════════════ */
    [data-theme="light"]{
      --bg-page:      #FFFFFF;
      --bg-section:   #F7F8F6;
      --bg-alt:       #FFFFFF;
      --bg-card:      #FFFFFF;
      --bg-card-hover:#F7F8F6;
      --bg-input:     #F7F8F6;
      --bg-code:      #0D1117;
      --bg-terminal:  #0D1117;

      --border:       #E4E4E4;
      --border-hover: #CCCCCC;
      --border-strong:#AAAAAA;

      --text-primary:   #1A1A1A;
      --text-secondary: #555555;
      --text-muted:     #888888;
      --text-placeholder:#AAAAAA;

      --nav-bg:       rgba(255,255,255,.92);
      --nav-border:   #E4E4E4;
      --nav-link:     #555555;
      --nav-link-hover:#1A1A1A;

      --hero-headline:#1A1A1A;
      --hero-bg:      #F7F8F6;

      --method-card:  #FFFFFF;
      --method-border:#E4E4E4;
      --method-hover: #F7F8F6;

      --stepper-bg:   #F7F8F6;
      --screen-bg:    #FFFFFF;
      --screen-bar:   #F0F0F0;
      --screen-border:#E4E4E4;
      --screen-input: #F7F8F6;
      --screen-text:  #333333;

      --dev-bg:       #F7F8F6;
      --pillar-bg:    #FFFFFF;
      --pillar-border:#E4E4E4;

      --faq-bg:       #F7F8F6;
      --faq-card:     #FFFFFF;
      --faq-border:   #E4E4E4;
      --faq-hover:    #F0F9EA;
      --faq-text:     #555555;

      --cta-bg:       #1A1A1A;
      --cta-card:     #242424;
      --cta-border:   rgba(82,168,40,.4);

      --cert-bg:      #FFFFFF;
      --cert-card:    #FFFFFF;
      --cert-border:  #E4E4E4;
      --cert-bdm:     #1A1A1A;
      --cert-simo-bg: #E3F2FD;
      --cert-mpesa-bg:#E8F5E9;
      --cert-emola-bg:#FFF3E0;
      --cert-mkesh-bg:#EDE7F6;

      --footer-bg:    #1A1A1A;
      --footer-border:rgba(255,255,255,.07);
      --footer-text:  rgba(255,255,255,.28);
      --footer-link:  rgba(255,255,255,.5);
      --footer-link-h:#6DC135;

      --sh-card: 0 4px 16px rgba(0,0,0,.09);
      --sh-green: 0 4px 20px rgba(82,168,40,.18);
    }

    /* ─── TRANSITION on theme change ─── */
    body,
    .navbar,.hero,.methods-section,.stepper-section,
    .usecases-section,.dev-section,.faq-section,
    .cta-section,.certs-section,.footer,
    .method-card,.faq-item,.cert-card,.panel-screen,
    .dev-pillar,.cta-card,.footer-lnk {
      transition: background-color .3s ease, border-color .3s ease, color .3s ease;
    }

    /* ─── BASE ─── */
    body { 
      font-family:var(--font-body); 
      font-size:16px; 
      line-height:1.6; 
      color:var(--text-primary); 
      background:var(--bg-page); 
      overflow-x:hidden; 
    }
    h1,h2,h3,h4,h5 { 
      font-family:var(--font-head); 
      line-height:1.12; 
      color:var(--text-primary); 
    }
    p { 
      color:var(--text-secondary); 
      line-height:1.65; 
    }
    .container { 
      max-width:1200px; 
      margin:0 auto; 
      padding:0 24px; 
    }

    /* ─── REVEAL ─── */
    .reveal { 
      opacity:0; 
      transform:translateY(26px); 
      transition:opacity .65s ease,transform .65s ease; 
    }
    .reveal.visible { 
      opacity:1; 
      transform:translateY(0); 
    }

    /* ─── SECTION COMMON ─── */
    .section-tag {
      display:inline-flex; 
      align-items:center; 
      gap:6px;
      background:var(--green-tint); 
      border:1px solid var(--green-tint2);
      color:var(--green-light);
      font-family:var(--font-head); 
      font-size:.65rem; 
      font-weight:700;
      letter-spacing:.1em; 
      text-transform:uppercase;
      padding:5px 14px; 
      border-radius:var(--r-full);
      margin-bottom:16px;
    }
    .section-tag.center { 
      display:flex; 
      width:fit-content; 
      margin:0 auto 16px; 
    }
    .section-h { 
      font-size:clamp(1.6rem,3.5vw,2.5rem); 
      font-weight:800; 
      letter-spacing:-.025em; 
      margin-bottom:14px; 
      color:var(--text-primary); 
    }
    .section-h.center { 
      text-align:center; 
    }
    .section-p { 
      font-size:1.02rem; 
      color:var(--text-secondary); 
      max-width:560px; 
      margin-bottom:40px; 
    }
    .section-p.center { 
      text-align:center; 
      margin:0 auto 40px; 
    }

    /* ─── HERO ACCENT ─── */
    .hero-accent { 
      color:var(--green-light); 
    }

    /* ─── BUTTONS ─── */
    .btn {
      display:inline-flex; 
      align-items:center; 
      justify-content:center; 
      gap:7px;
      font-family:var(--font-head); 
      font-weight:700; 
      font-size:.88rem; 
      letter-spacing:.01em;
      border-radius:var(--r-md); 
      padding:0 22px; 
      height:44px;
      transition:all var(--t-fast); 
      white-space:nowrap; 
      cursor:pointer;
    }
    .btn-primary { 
      background:var(--green); 
      color:#fff; 
      box-shadow:0 2px 12px rgba(82,168,40,.32); 
    }
    .btn-primary:hover { 
      background:var(--green-dark); 
      transform:translateY(-1px); 
      box-shadow:0 5px 20px rgba(82,168,40,.45); 
    }
    .btn-primary:active { 
      transform:translateY(0); 
    }
    .btn-ghost  { 
      background:transparent; 
      color:var(--text-primary); 
      border:1.5px solid var(--border-strong); 
    }
    .btn-ghost:hover { 
      background:var(--bg-card); 
      border-color:var(--border-hover); 
    }
    .btn-lg { 
      height:52px; 
      font-size:.95rem; 
      padding:0 30px; 
      border-radius:var(--r-lg); 
    }

    .btn-ghost-nav { 
      background:transparent; 
      color:var(--nav-link); 
      border:1px solid var(--border); 
      font-family:var(--font-head); 
      font-weight:600; 
      font-size:.8rem; 
      padding:0 14px; 
      height:34px; 
      border-radius:var(--r-md); 
      transition:all var(--t-fast); 
    }
    .btn-ghost-nav:hover { 
      border-color:var(--border-hover); 
      color:var(--nav-link-hover); 
    }
    .btn-primary-nav { 
      background:var(--green); 
      color:#fff; 
      font-family:var(--font-head); 
      font-weight:700; 
      font-size:.8rem; 
      padding:0 14px; 
      height:34px; 
      border-radius:var(--r-md); 
      transition:all var(--t-fast); 
    }
    .btn-primary-nav:hover { 
      background:var(--green-dark); 
    }

    /* ════════════════════════════════════
       CTA SECTION (Estilo da imagem)
    ═════════════════════════════════════ */
    .cta-modern {
      padding: 120px 0;
      background: var(--cta-bg);
      position: relative;
      overflow: hidden;
    }
    
    .cta-modern::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at top, rgba(82,168,40,.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .cta-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 1;
    }

    .cta-box {
      background: var(--cta-card);
      border: 1px solid var(--cta-border);
      border-radius: var(--r-2xl);
      padding: 80px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: var(--sh-green);
    }

    .cta-box::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(82,168,40,.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-content {
      position: relative;
      z-index: 1;
    }

    .cta-title {
      font-family: var(--font-head);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -.02em;
      color: var(--text-primary);
      margin-bottom: 20px;
      line-height: 1.1;
    }

    .cta-subtitle {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }

    .cta-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-white {
      background: var(--text-primary);
      color: var(--bg-page);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: .9rem;
      padding: 0 28px;
      height: 52px;
      border-radius: var(--r-lg);
      transition: all var(--t-fast);
      border: none;
    }

    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,255,255,.2);
    }

    .btn-link {
      background: transparent;
      color: var(--text-primary);
      font-family: var(--font-head);
      font-weight: 600;
      font-size: .95rem;
      padding: 0 20px;
      height: 52px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all var(--t-fast);
      border: 1.5px solid transparent;
    }

    .btn-link:hover {
      color: var(--green-light);
      border-color: var(--border);
    }

    .btn-link svg {
      width: 18px;
      height: 18px;
      transition: transform var(--t-fast);
    }

    .btn-link:hover svg {
      transform: translateX(4px);
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: var(--r-full);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background: var(--bg-card);
      border: 1px solid var(--border);
      transition: all var(--t-fast);
      z-index: 1000;
      cursor: pointer;
    }

    .theme-toggle:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .theme-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    [data-theme="dark"] .theme-icon-light { display: none; }
    [data-theme="light"] .theme-icon-dark { display: none; }

    /* Responsive */
    @media (max-width: 768px) {
      .cta-modern {
        padding: 80px 0;
      }
      
      .cta-box {
        padding: 60px 30px;
      }
      
      .cta-actions {
        flex-direction: column;
        width: 100%;
      }
      
      .btn-white,
      .btn-link {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .cta-title {
        font-size: clamp(1.5rem, 6vw, 2.5rem);
      }
      
      .cta-subtitle {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Theme Toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema">
    <span class="theme-icon theme-icon-dark">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </span>
    <span class="theme-icon theme-icon-light">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </span>
  </button>

  <!-- CTA Section -->
  <section class="cta-modern" aria-labelledby="cta-heading">
    <div class="cta-container">
      <div class="cta-box reveal">
        <div class="cta-content">
          <h2 class="cta-title" id="cta-heading">
            Pronto para modernizar os seus pagamentos?</span>
          </h2>
          
          <p class="cta-subtitle">
            Junte-se a centenas de empresas moçambicanas que já estão a facturar com o iMaliway.
          </p>
          
          <div class="cta-actions">
            <button class="btn-white" onclick="handleCreateAccount()">
              Criar conta grátis
            </button>
            
            <button class="btn-link" onclick="handleContactTeam()">
              Falar com a equipa
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    // Theme Toggle Functionality
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      
      // Add animation class
      document.body.style.transition = 'background-color 0.3s ease, color 0.3s ease';
    }

    // Load saved theme on page load
    document.addEventListener('DOMContentLoaded', () => {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      
      // Trigger reveal animation
      setTimeout(() => {
        document.querySelector('.reveal').classList.add('visible');
      }, 100);
    });

    // Button handlers
    function handleCreateAccount() {
      console.log('Criar conta grátis clicked');
      // Add your registration logic here
      alert('Redirecionando para criação de conta...');
    }

    function handleContactTeam() {
      console.log('Falar com a equipa clicked');
      // Add your contact logic here
      alert('Abrindo canal de contacto...');
    }

    // Intersection Observer for scroll animations
    const observerOptions = {
      root: null,
      rootMargin: '0px',
      threshold: 0.1
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, observerOptions);

    // Observe elements with reveal class
    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
  </script>
</body>
</html>
